<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CarWash — Estado del Vehículo</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #0a0e14;
            --card: #111720;
            --border: #1e2d3d;
            --accent: #00c6ff;
            --text: #e8f1ff;
            --muted: #5a7a99;
            --danger: #ff5c5c;
        }
        html, body { background: var(--bg); font-family: 'DM Sans', sans-serif; color: var(--text); min-height: 100vh; }
        .container { display: flex; flex-direction: column; min-height: 100vh; padding: 16px; max-width: 560px; margin: 0 auto; padding-bottom: 40px; }

        .header-area { display: flex; align-items: center; padding-bottom: 20px; position: relative; }
        .btn-back { text-decoration: none; color: var(--text); font-size: 13px; font-weight: 600; background: rgba(0,198,255,0.1); padding: 8px 15px; border-radius: 8px; border: 1px solid var(--accent); z-index: 10; transition: background 0.2s; }
        .btn-back:hover { background: rgba(0,198,255,0.2); }
        h2 { font-family: 'Bebas Neue', sans-serif; color: var(--accent); font-size: 22px; letter-spacing: 2px; position: absolute; width: 100%; text-align: center; left: 0; pointer-events: none; }

        .form-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 26px 22px; display: flex; flex-direction: column; gap: 22px; }
        .form-title { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 1.5px; padding-bottom: 4px; border-bottom: 1px solid var(--border); }
        .section-label { font-size: 11px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: -8px; }
        .form-group { display: flex; flex-direction: column; gap: 8px; }
        .form-label { font-size: 13px; font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 5px; }
        .req { color: var(--accent); font-size: 16px; line-height: 1; }

        .form-input { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; color: var(--text); padding: 12px 14px; font-size: 15px; font-family: inherit; outline: none; transition: border-color 0.2s, box-shadow 0.2s; width: 100%; }
        .form-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,198,255,0.1); }
        .form-input::placeholder { color: var(--muted); }
        .form-input[type="number"]::-webkit-outer-spin-button,
        .form-input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
        .form-textarea { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; color: var(--text); padding: 12px 14px; font-size: 15px; font-family: inherit; outline: none; transition: border-color 0.2s, box-shadow 0.2s; width: 100%; resize: vertical; min-height: 100px; }
        .form-textarea:focus { border-color: var(--danger); box-shadow: 0 0 0 3px rgba(255,92,92,0.1); }
        .form-textarea::placeholder { color: var(--muted); }

        /* ESTADO CHIPS - cuatro opciones con colores */
        .estado-grid { display: flex; flex-direction: column; gap: 9px; }
        .estado-label { cursor: pointer; }
        .estado-label input { display: none; }
        .estado-chip { display: flex; align-items: center; gap: 12px; padding: 14px 16px; border-radius: 12px; border: 1px solid var(--border); background: var(--bg); color: var(--muted); font-size: 14px; font-weight: 500; transition: all 0.18s ease; user-select: none; }
        .estado-chip:hover { color: var(--text); }
        .chip-dot { width: 16px; height: 16px; border-radius: 50%; border: 2px solid var(--border); flex-shrink: 0; transition: all 0.18s; display: flex; align-items: center; justify-content: center; }
        .chip-dot::after { content: ""; width: 6px; height: 6px; border-radius: 50%; background: transparent; transition: background 0.18s; }

        /* Terminado → verde */
        .estado-label[data-color="green"] .estado-chip:hover { border-color: #00e676; }
        .estado-label[data-color="green"] input:checked + .estado-chip { background: rgba(0,230,118,0.1); border-color: #00e676; color: #00e676; font-weight: 600; }
        .estado-label[data-color="green"] input:checked + .estado-chip .chip-dot { border-color: #00e676; background: #00e676; }
        .estado-label[data-color="green"] input:checked + .estado-chip .chip-dot::after { background: #000; }

        /* Retirado → azul */
        .estado-label[data-color="blue"] .estado-chip:hover { border-color: var(--accent); }
        .estado-label[data-color="blue"] input:checked + .estado-chip { background: rgba(0,198,255,0.1); border-color: var(--accent); color: var(--accent); font-weight: 600; }
        .estado-label[data-color="blue"] input:checked + .estado-chip .chip-dot { border-color: var(--accent); background: var(--accent); }
        .estado-label[data-color="blue"] input:checked + .estado-chip .chip-dot::after { background: #000; }

        /* Terminado y Retirado → amarillo */
        .estado-label[data-color="yellow"] .estado-chip:hover { border-color: #ffd600; }
        .estado-label[data-color="yellow"] input:checked + .estado-chip { background: rgba(255,214,0,0.1); border-color: #ffd600; color: #ffd600; font-weight: 600; }
        .estado-label[data-color="yellow"] input:checked + .estado-chip .chip-dot { border-color: #ffd600; background: #ffd600; }
        .estado-label[data-color="yellow"] input:checked + .estado-chip .chip-dot::after { background: #000; }

        /* Cancelar → rojo */
        .estado-label[data-color="red"] .estado-chip:hover { border-color: var(--danger); }
        .estado-label[data-color="red"] input:checked + .estado-chip { background: rgba(255,92,92,0.1); border-color: var(--danger); color: var(--danger); font-weight: 600; }
        .estado-label[data-color="red"] input:checked + .estado-chip .chip-dot { border-color: var(--danger); background: var(--danger); }
        .estado-label[data-color="red"] input:checked + .estado-chip .chip-dot::after { background: #000; }

        /* RESPONSABLE CHIPS */
        .resp-grid { display: flex; flex-wrap: wrap; gap: 9px; }
        .resp-label { cursor: pointer; }
        .resp-label input { display: none; }
        .resp-chip { display: inline-flex; align-items: center; padding: 8px 16px; border-radius: 50px; border: 1px solid var(--border); background: var(--bg); color: var(--muted); font-size: 13px; font-weight: 500; transition: all 0.18s; user-select: none; }
        .resp-chip:hover { border-color: rgba(255,92,92,0.4); color: var(--text); }
        .resp-label input:checked + .resp-chip { background: rgba(255,92,92,0.12); border-color: var(--danger); color: var(--danger); font-weight: 600; }

        /* CAMPO HINT */
        .field-hint { font-size: 11px; color: var(--muted); margin-top: -4px; }

        /* SECCIONES CONDICIONALES */
        .cond-field { display: none; flex-direction: column; gap: 8px; animation: fadeIn 0.2s ease; }
        .cond-field.visible { display: flex; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }

        /* BLOQUE CANCELACIÓN */
        .cancel-block { display: none; flex-direction: column; gap: 18px; padding: 18px; background: rgba(255,92,92,0.05); border: 1px solid rgba(255,92,92,0.2); border-radius: 14px; animation: fadeIn 0.2s ease; }
        .cancel-block.visible { display: flex; }
        .cancel-title { font-size: 12px; font-weight: 700; color: var(--danger); text-transform: uppercase; letter-spacing: 1px; }

        .divider { height: 1px; background: var(--border); }

        .error-banner { display: none; background: rgba(255,80,80,0.1); border: 1px solid rgba(255,80,80,0.3); border-radius: 10px; color: #ff7b7b; padding: 12px 16px; font-size: 13px; text-align: center; }

        .btn-submit { background: var(--accent); color: #000; border: none; border-radius: 12px; padding: 15px; font-size: 16px; font-weight: 700; cursor: pointer; font-family: inherit; transition: background 0.2s, transform 0.1s; display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; }
        .btn-submit:hover { background: #00aadd; }
        .btn-submit:active { transform: scale(0.98); }
        .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }
        .btn-submit.danger { background: var(--danger); }
        .btn-submit.danger:hover { background: #e04444; }

        .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid rgba(0,0,0,0.3); border-top-color: #000; border-radius: 50%; animation: spin 0.6s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .success-screen { display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 60px 20px; gap: 14px; }
        .success-screen .icon { font-size: 64px; }
        .success-screen h3 { font-family: 'Bebas Neue', sans-serif; font-size: 30px; letter-spacing: 2px; }
        .success-screen p { color: var(--muted); font-size: 14px; line-height: 1.7; }
        .btn-nuevo { margin-top: 10px; background: rgba(0,198,255,0.1); border: 1px solid var(--accent); color: var(--accent); border-radius: 12px; padding: 12px 28px; font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; transition: background 0.2s; }
        .btn-nuevo:hover { background: rgba(0,198,255,0.2); }
    </style>
</head>
<body>
    <div class="container">

        <div class="header-area">
            <a href="index.html" class="btn-back">← VOLVER</a>
            <h2>ESTADO VEHÍCULO</h2>
        </div>

        <div class="form-card" id="formCard">
            <div class="form-title">🚗 Registrar Estado</div>

            <!-- ESTADO -->
            <div class="section-label">📋 Estado del vehículo</div>
            <div class="form-group">
                <label class="form-label">¿Qué deseas registrar? <span class="req">*</span></label>
                <div class="estado-grid">
                    <label class="estado-label" data-color="green">
                        <input type="radio" name="estado" value="Terminado" onchange="onEstadoChange(this.value)">
                        <div class="estado-chip"><div class="chip-dot"></div> ✅ Terminado</div>
                    </label>
                    <label class="estado-label" data-color="blue">
                        <input type="radio" name="estado" value="Retirado" onchange="onEstadoChange(this.value)">
                        <div class="estado-chip"><div class="chip-dot"></div> 🚗 Retirado</div>
                    </label>
                    <label class="estado-label" data-color="yellow">
                        <input type="radio" name="estado" value="Terminado y Retirado" onchange="onEstadoChange(this.value)">
                        <div class="estado-chip"><div class="chip-dot"></div> ✅🚗 Terminado y Retirado</div>
                    </label>
                    <label class="estado-label" data-color="red">
                        <input type="radio" name="estado" value="Cancelar orden" onchange="onEstadoChange(this.value)">
                        <div class="estado-chip"><div class="chip-dot"></div> ❌ Cancelar orden</div>
                    </label>
                </div>
            </div>

            <!-- NÚMERO DE ORDEN (aparece con cualquier estado) -->
            <div class="cond-field" id="campoOrden">
                <div class="divider"></div>
                <label class="form-label">Número de orden del vehículo <span class="req">*</span></label>
                <input class="form-input" type="number" id="numOrden" placeholder="Ej: 42" min="1">
                <span class="field-hint">Puedes verificarlo en el Google Sheets</span>
            </div>

            <!-- BLOQUE CANCELACIÓN (solo si es "Cancelar orden") -->
            <div class="cancel-block" id="cancelBlock">
                <div class="cancel-title">⚠️ Información de cancelación</div>

                <div class="form-group">
                    <label class="form-label" style="color:var(--danger)">Motivo de cancelación <span class="req">*</span></label>
                    <textarea class="form-textarea" id="motivoCancelacion" placeholder="Describe el motivo por el que se cancela el servicio..."></textarea>
                </div>

                <div class="form-group">
                    <label class="form-label" style="color:var(--danger)">Responsable de la cancelación <span class="req">*</span></label>
                    <div class="resp-grid">
                        <label class="resp-label"><input type="radio" name="responsable" value="Juan"><span class="resp-chip">Juan</span></label>
                        <label class="resp-label"><input type="radio" name="responsable" value="Jesus"><span class="resp-chip">Jesus</span></label>
                        <label class="resp-label"><input type="radio" name="responsable" value="Ricardo"><span class="resp-chip">Ricardo</span></label>
                        <label class="resp-label"><input type="radio" name="responsable" value="Ronald"><span class="resp-chip">Ronald</span></label>
                        <label class="resp-label"><input type="radio" name="responsable" value="Andrey"><span class="resp-chip">Andrey</span></label>
                        <label class="resp-label"><input type="radio" name="responsable" value="Angie"><span class="resp-chip">Angie</span></label>
                        <label class="resp-label"><input type="radio" name="responsable" value="Eder"><span class="resp-chip">Eder</span></label>
                    </div>
                </div>
            </div>

            <!-- ERROR -->
            <div class="error-banner" id="errorBanner">
                ⚠️ <span id="errorMsg">Por favor completa todos los campos.</span>
            </div>

            <button class="btn-submit" id="btnSubmit" onclick="enviarEstado()">
                Registrar estado →
            </button>
        </div>

        <!-- SUCCESS -->
        <div class="success-screen" id="successScreen">
            <div class="icon" id="successIcon">✅</div>
            <h3 id="successTitle">¡Estado Registrado!</h3>
            <p id="successDetail">El estado fue guardado en Google Sheets.</p>
            <button class="btn-nuevo" onclick="resetForm()">+ Registrar otro estado</button>
            <a href="index.html" class="btn-back" style="margin-top:8px;">← Volver al menú</a>
        </div>

    </div>

    <script>
        // ⚠️ REEMPLAZA con tu webhook de n8n
        const N8N_WEBHOOK_URL = "https://TU-N8N-URL/webhook/estado";

        function onEstadoChange(valor) {
            // Mostrar campo de orden
            document.getElementById("campoOrden").classList.add("visible");

            // Bloque cancelación solo si es "Cancelar orden"
            const esCancelacion = valor === "Cancelar orden";
            document.getElementById("cancelBlock").classList.toggle("visible", esCancelacion);

            // Cambiar color del botón
            const btn = document.getElementById("btnSubmit");
            if (esCancelacion) {
                btn.classList.add("danger");
                btn.textContent = "❌ Cancelar orden";
            } else {
                btn.classList.remove("danger");
                btn.textContent = "Registrar estado →";
            }

            // Limpiar campos de cancelación si se cambia de opción
            if (!esCancelacion) {
                document.getElementById("motivoCancelacion").value = "";
                document.querySelectorAll('input[name="responsable"]').forEach(r => r.checked = false);
            }
        }

        async function enviarEstado() {
            const estadoEl  = document.querySelector('input[name="estado"]:checked');
            const numOrden  = document.getElementById("numOrden").value.trim();
            const errorBanner = document.getElementById("errorBanner");
            const errorMsg    = document.getElementById("errorMsg");

            if (!estadoEl) {
                errorMsg.textContent = "Por favor selecciona el estado del vehículo.";
                errorBanner.style.display = "block"; return;
            }
            if (!numOrden) {
                errorMsg.textContent = "Por favor ingresa el número de orden.";
                errorBanner.style.display = "block"; return;
            }

            const estado = estadoEl.value;
            let motivo = "";
            let responsable = "";

            if (estado === "Cancelar orden") {
                motivo = document.getElementById("motivoCancelacion").value.trim();
                const respEl = document.querySelector('input[name="responsable"]:checked');
                if (!motivo) {
                    errorMsg.textContent = "Por favor ingresa el motivo de cancelación.";
                    errorBanner.style.display = "block"; return;
                }
                if (!respEl) {
                    errorMsg.textContent = "Por favor selecciona el responsable de la cancelación.";
                    errorBanner.style.display = "block"; return;
                }
                responsable = respEl.value;
            }

            errorBanner.style.display = "none";
            const btn = document.getElementById("btnSubmit");
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Enviando...';

            const payload = {
                estado,
                numero_orden: parseInt(numOrden),
                motivo_cancelacion:      motivo       || "No aplica",
                responsable_cancelacion: responsable  || "No aplica"
            };

            try {
                const response = await fetch(N8N_WEBHOOK_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });
                if (!response.ok) throw new Error("Error " + response.status);

                // Pantalla de éxito según estado
                const iconos = {
                    "Terminado": "✅",
                    "Retirado": "🚗",
                    "Terminado y Retirado": "🎉",
                    "Cancelar orden": "❌"
                };
                document.getElementById("successIcon").textContent = iconos[estado] || "✅";
                document.getElementById("successTitle").textContent =
                    estado === "Cancelar orden" ? "¡Orden Cancelada!" : "¡Estado Registrado!";
                document.getElementById("successDetail").innerHTML =
                    `Orden #<strong>${numOrden}</strong><br>Estado: <strong>${estado}</strong>` +
                    (responsable ? `<br>Responsable: ${responsable}` : "");

                document.getElementById("formCard").style.display = "none";
                document.getElementById("successScreen").style.display = "flex";

            } catch (err) {
                errorMsg.textContent = "Error al enviar. Verifica la conexión e intenta de nuevo.";
                errorBanner.style.display = "block";
                btn.disabled = false;
                btn.innerHTML = estado === "Cancelar orden" ? "❌ Cancelar orden" : "Registrar estado →";
                if (estado === "Cancelar orden") btn.classList.add("danger");
            }
        }

        function resetForm() {
            document.querySelectorAll('input[name="estado"]').forEach(r => r.checked = false);
            document.querySelectorAll('input[name="responsable"]').forEach(r => r.checked = false);
            document.getElementById("numOrden").value = "";
            document.getElementById("motivoCancelacion").value = "";
            document.getElementById("campoOrden").classList.remove("visible");
            document.getElementById("cancelBlock").classList.remove("visible");
            document.getElementById("errorBanner").style.display = "none";
            const btn = document.getElementById("btnSubmit");
            btn.disabled = false;
            btn.classList.remove("danger");
            btn.textContent = "Registrar estado →";
            document.getElementById("formCard").style.display = "flex";
            document.getElementById("successScreen").style.display = "none";
        }
    </script>
</body>
</html>
