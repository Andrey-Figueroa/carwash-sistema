<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Formulario de inspección mecánica profesional" />
  <title>Inspección Mecánica | Sus Amigos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="app-header">
    <div class="header-inner">
      <div style="display: flex; align-items: center; gap: 15px;">
        <a href="mecanica.html" class="btn-regresar">← Volver</a>
        <div class="brand"><span class="brand-icon">⚙</span><h1>Inspección Mecánica</h1></div>
      </div>
      <span class="header-badge" id="headerStep">Paso 1 de 7</span>
    </div>
  </header>

  <nav class="progress-bar" aria-label="Progreso del formulario">
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    <ol class="progress-steps" id="progressSteps">
      <li class="step-dot active" data-step="1"><span>1</span><small>Vehículo</small></li>
      <li class="step-dot" data-step="2"><span>2</span><small>Int/Ext</small></li>
      <li class="step-dot" data-step="3"><span>3</span><small>Inferior</small></li>
      <li class="step-dot" data-step="4"><span>4</span><small>Neumáticos</small></li>
      <li class="step-dot" data-step="5"><span>5</span><small>Motor</small></li>
      <li class="step-dot" data-step="6"><span>6</span><small>Frenos</small></li>
      <li class="step-dot" data-step="7"><span>7</span><small>Notas</small></li>
    </ol>
  </nav>

  <main class="form-container" id="formContainer">
    <!-- PASO 1 -->
    <section class="form-step active" data-step="1">
      <div class="card">
        <div class="card-header"><span class="card-icon">🚗</span><h2>Datos del Vehículo</h2></div>
        <div class="card-body grid-2">
          <div class="field"><label for="placa">Placa</label><input type="text" id="placa" placeholder="Ej: ABC-123" required /></div>
          <div class="field"><label for="cliente">Cliente</label><input type="text" id="cliente" placeholder="Nombre del cliente" required /></div>
          <div class="field"><label for="mecanico">Mecánico</label><input type="text" id="mecanico" placeholder="Nombre del mecánico" required /></div>
          <div class="field"><label for="marca">Marca</label><input type="text" id="marca" placeholder="Ej: Toyota" required /></div>
          <div class="field"><label for="modelo">Modelo</label><input type="text" id="modelo" placeholder="Ej: Corolla" required /></div>
          <div class="field"><label for="anio">Año</label><input type="number" id="anio" placeholder="Ej: 2022" min="1950" max="2030" required /></div>
        </div>
      </div>
    </section>
    <!-- PASO 2 -->
    <section class="form-step" data-step="2">
      <div class="card">
        <div class="card-header"><span class="card-icon">🔦</span><h2>Interior / Exterior</h2></div>
        <div class="card-body"><div class="checklist" id="checklistInteriorExterior"></div></div>
      </div>
    </section>
    <!-- PASO 3 -->
    <section class="form-step" data-step="3">
      <div class="card">
        <div class="card-header"><span class="card-icon">🔧</span><h2>Parte Inferior</h2></div>
        <div class="card-body"><div class="checklist" id="checklistParteInferior"></div></div>
      </div>
    </section>
    <!-- PASO 4 -->
    <section class="form-step" data-step="4">
      <div class="card">
        <div class="card-header"><span class="card-icon">🛞</span><h2>Neumáticos</h2></div>
        <div class="card-body"><div class="checklist" id="checklistNeumaticos"></div></div>
      </div>
    </section>
    <!-- PASO 5 -->
    <section class="form-step" data-step="5">
      <div class="card">
        <div class="card-header"><span class="card-icon">⚡</span><h2>Motor</h2></div>
        <div class="card-body"><div class="checklist" id="checklistMotor"></div></div>
      </div>
    </section>
    <!-- PASO 6 -->
    <section class="form-step" data-step="6">
      <div class="card">
        <div class="card-header"><span class="card-icon">🛑</span><h2>Frenos</h2></div>
        <div class="card-body"><div class="checklist" id="checklistFrenos"></div></div>
      </div>
    </section>
    <!-- PASO 7 -->
    <section class="form-step" data-step="7">
      <div class="card">
        <div class="card-header"><span class="card-icon">📝</span><h2>Observaciones</h2></div>
        <div class="card-body">
          <div class="field"><label for="observaciones">Notas adicionales</label><textarea id="observaciones" rows="6" placeholder="Escriba aquí cualquier observación adicional..."></textarea></div>
          <div class="summary-section" id="summarySection"><h3 class="summary-title">Resumen de Inspección</h3><div id="summaryContent"></div></div>
        </div>
      </div>
    </section>
  </main>

  <footer class="form-nav">
    <button type="button" class="btn btn-back" id="btnBack" disabled>← Atrás</button>
    <button type="button" class="btn btn-next" id="btnNext">Siguiente →</button>
    <button type="button" class="btn btn-save hidden" id="btnSave">💾 Guardar Inspección</button>
    <button type="button" class="btn btn-pdf hidden" id="btnPdf">📄 Generar PDF</button>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
