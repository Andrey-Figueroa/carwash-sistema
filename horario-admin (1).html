<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crear Horario — Administración</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root { --bg: #0a0c0f; --card: #111418; --card-hover: #181d24; --border: #1e2730; --gold: #c9a84c; --text: #f0e8d5; --muted: #7a6a4a; --green: #00e676; --blue: #00c6ff; }
        body { background: var(--bg); font-family: "DM Sans", sans-serif; color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 0 0 80px; }

        .topbar { width: 100%; background: var(--card); border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; gap: 14px; }
        .back-btn { color: var(--muted); font-size: 13px; text-decoration: none; display: flex; align-items: center; gap: 6px; transition: color 0.2s; background: none; border: none; cursor: pointer; font-family: inherit; }
        .back-btn:hover { color: var(--gold); }
        .topbar-title { font-family: "Bebas Neue", sans-serif; font-size: 20px; letter-spacing: 2px; color: var(--gold); }

        .page { width: 100%; max-width: 700px; padding: 32px 20px 0; }
        .section-title { font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 12px; margin-top: 28px; }
        .section-title:first-child { margin-top: 0; }

        .empleados-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; margin-bottom: 4px; }
        .empleado-chip { display: flex; align-items: center; gap: 8px; background: var(--card); border: 1px solid var(--border); border-radius: 50px; padding: 8px 14px; font-size: 13px; cursor: pointer; transition: all 0.15s; user-select: none; }
        .empleado-chip.selected { border-color: var(--gold); background: rgba(201,168,76,0.1); color: var(--gold); }
        .empleado-chip .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); transition: background 0.15s; flex-shrink: 0; }
        .empleado-chip.selected .dot { background: var(--gold); }

        .dias-table { width: 100%; border-collapse: collapse; }
        .dias-table th { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; padding: 10px 12px; border-bottom: 1px solid var(--border); text-align: left; }
        .dias-table td { padding: 8px 12px; border-bottom: 1px solid rgba(30,39,48,0.7); vertical-align: middle; }
        .dias-table tr:last-child td { border-bottom: none; }
        .dia-label { font-size: 14px; font-weight: 500; min-width: 100px; }
        
        .turno-sel { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 8px 12px; font-size: 13px; font-family: inherit; outline: none; cursor: pointer; transition: border-color 0.2s; width: 100%; }
        .turno-sel:focus { border-color: var(--gold); }
        .turno-sel option { background: var(--card); }

        .preview-box { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 20px; margin-top: 16px; }
        .preview-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid rgba(30,39,48,0.6); font-size: 13px; }
        .preview-row:last-child { border-bottom: none; }
        .turno-badge { padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
        .t-m { background: rgba(255,200,50,0.15); color: #ffc832; }
        .t-t { background: rgba(0,198,255,0.12); color: var(--blue); }
        .t-libre { background: rgba(122,106,74,0.15); color: var(--muted); }
        .t-doble { background: rgba(0,230,118,0.12); color: var(--green); }

        .btn-save { width: 100%; background: linear-gradient(135deg, #c9a84c, #a07828); color: #000; border: none; border-radius: 14px; padding: 16px; font-size: 16px; font-weight: 700; cursor: pointer; font-family: inherit; transition: opacity 0.2s; margin-top: 24px; letter-spacing: 0.5px; }
        .btn-save:hover { opacity: 0.88; }

        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--green); color: #000; border-radius: 50px; padding: 12px 28px; font-size: 14px; font-weight: 700; transition: transform 0.3s ease; z-index: 999; }
        .toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>
    <div class="topbar">
        <button class="back-btn" onclick="window.location.href='admin.html'">← Volver</button>
        <span style="color:var(--border)">|</span>
        <span class="topbar-title">📅 CREAR HORARIO</span>
    </div>

    <div class="page">
        <div class="section-title">Empleados disponibles</div>
        <div class="empleados-grid" id="empleadosGrid">
            <!-- Generado por JS -->
        </div>

        <div class="section-title">Asignar turnos por día</div>
        <div class="preview-box">
            <table class="dias-table">
                <thead><tr><th>Día</th><th>Empleado</th><th>Turno</th></tr></thead>
                <tbody id="tablaAsignacion">
                    <!-- Generado por JS -->
                </tbody>
            </table>
        </div>

        <div class="section-title">Vista previa del horario</div>
        <div class="preview-box" id="preview">
            <p style="color:var(--muted);font-size:13px;text-align:center;">Completa los turnos arriba para ver la vista previa.</p>
        </div>

        <button class="btn-save" onclick="guardarHorario()">💾 Guardar Horario de la Próxima Semana</button>
    </div>

    <div class="toast" id="toast">✅ Horario guardado correctamente</div>

    <script>
        const EMPLEADOS = ["María R.", "Pedro V.", "Juan M.", "Ana S.", "Carlos T.", "Laura M."];
        const DIAS = ["Lunes","Martes","Miércoles","Jueves","Viernes","Sábado","Domingo"];
        let selEmpleados = [...EMPLEADOS];

        function renderEmpleados() {
            const g = document.getElementById("empleadosGrid");
            g.innerHTML = "";
            EMPLEADOS.forEach(e => {
                const chip = document.createElement("div");
                chip.className = "empleado-chip" + (selEmpleados.includes(e) ? " selected" : "");
                chip.innerHTML = '<div class="dot"></div>' + e;
                chip.onclick = () => {
                    if (selEmpleados.includes(e)) selEmpleados = selEmpleados.filter(x => x !== e);
                    else selEmpleados.push(e);
                    renderEmpleados(); renderTabla(); renderPreview();
                };
                g.appendChild(chip);
            });
        }

        function renderTabla() {
            const tb = document.getElementById("tablaAsignacion");
            tb.innerHTML = "";
            DIAS.forEach(dia => {
                const tr = document.createElement("tr");
                const empOptions = selEmpleados.map(e => '<option value="'+e+'">'+e+'</option>').join("") + '<option value="libre">— Libre —</option>';
                tr.innerHTML = '<td class="dia-label">'+dia+'</td>' +
                    '<td><select class="turno-sel" id="emp_'+dia+'" onchange="renderPreview()">' + empOptions + '</select></td>' +
                    '<td><select class="turno-sel" id="turno_'+dia+'" onchange="renderPreview()"><option value="manana">☀️ Mañana (7–13)</option><option value="tarde">🌙 Tarde (13–19)</option><option value="doble">🔥 Turno Completo (7–19)</option><option value="libre">🏖️ Libre</option></select></td>';
                tb.appendChild(tr);
            });
        }

        function renderPreview() {
            const pv = document.getElementById("preview");
            pv.innerHTML = "";
            let hasData = false;
            DIAS.forEach(dia => {
                const empEl = document.getElementById("emp_"+dia);
                const turnoEl = document.getElementById("turno_"+dia);
                if (!empEl) return;
                const emp = empEl.value;
                const turno = turnoEl.value;
                if (turno === "libre" && emp === "libre") return;
                hasData = true;
                const labels = { manana: ["☀️ Mañana","t-m","7:00 – 13:00"], tarde: ["🌙 Tarde","t-t","13:00 – 19:00"], doble: ["🔥 Completo","t-doble","7:00 – 19:00"], libre: ["🏖️ Libre","t-libre","—"] };
                const [label, cls, hora] = labels[turno];
                const row = document.createElement("div");
                row.className = "preview-row";
                row.innerHTML = '<span style="font-weight:600">'+dia+'</span><span style="color:var(--muted)">'+emp+'</span><span class="turno-badge '+cls+'">'+label+'</span><span style="color:var(--muted);font-size:12px">'+hora+'</span>';
                pv.appendChild(row);
            });
            if (!hasData) pv.innerHTML = '<p style="color:var(--muted);font-size:13px;text-align:center;">Completa los turnos arriba para ver la vista previa.</p>';
        }

        function guardarHorario() {
            const toast = document.getElementById("toast");
            toast.classList.add("show");
            setTimeout(() => toast.classList.remove("show"), 3000);
        }

        renderEmpleados(); renderTabla(); renderPreview();
    </script>
</body>
</html>
