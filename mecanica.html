<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial Mecánica — Sus Amigos</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #080600;
            --card: #130f00;
            --card-hover: #1c1500;
            --border: #2e2400;
            --accent: #c9a84c;
            --text: #f5e8c8;
            --muted: #8a7540;
            --gold: #c9a84c;
            --btn-whatsapp: #25D366;
            --btn-whatsapp-hover: #20BA56;
        }

        body {
            background: var(--bg);
            font-family: "DM Sans", sans-serif;
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0 0 80px;
            overflow-x: hidden;
        }

        .header {
            width: 100%;
            padding: 40px 20px 20px;
            text-align: center;
            position: relative;
            background: linear-gradient(180deg, rgba(201, 168, 76, 0.05) 0%, var(--bg) 100%);
            border-bottom: 1px solid var(--border);
            margin-bottom: 30px;
        }

        .btn-back {
            position: absolute;
            top: 40px;
            left: 20px;
            color: var(--text);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
            background: var(--card);
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: 50px;
            transition: all 0.2s;
        }

        .btn-back:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        h1 {
            font-family: "Bebas Neue", sans-serif;
            font-size: clamp(28px, 6vw, 44px);
            letter-spacing: 4px;
            line-height: 1;
            background: linear-gradient(135deg, #fff 30%, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
        }

        .btn-crear {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: linear-gradient(135deg, var(--accent), #a07828);
            color: #000;
            text-decoration: none;
            padding: 14px 28px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 16px;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(201, 168, 76, 0.2);
            border: none;
            cursor: pointer;
        }

        .btn-crear:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(201, 168, 76, 0.4);
            opacity: 0.9;
        }

        .container {
            width: 100%;
            max-width: 800px;
            padding: 0 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .list-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--gold);
        }

        .loader {
            text-align: center;
            padding: 40px;
            color: var(--muted);
            font-size: 16px;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            transition: all 0.2s ease;
        }

        .card:hover {
            border-color: rgba(201, 168, 76, 0.4);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .card-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            border-bottom: 1px solid var(--border);
            padding-bottom: 12px;
        }

        .card-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-placa {
            background: rgba(201, 168, 76, 0.1);
            color: var(--accent);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 1px;
            border: 1px solid rgba(201, 168, 76, 0.3);
        }

        .card-date {
            color: var(--muted);
            font-size: 13px;
        }

        .card-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
            font-size: 14px;
        }

        .detail-item {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .detail-label {
            color: var(--muted);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .detail-value {
            color: var(--text);
            font-weight: 500;
        }

        .card-actions {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }

        .btn-action {
            flex: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 16px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            border: 1px solid;
        }

        .btn-pdf {
            background: rgba(201, 168, 76, 0.1);
            color: var(--accent);
            border-color: rgba(201, 168, 76, 0.3);
        }

        .btn-pdf:hover {
            background: rgba(201, 168, 76, 0.2);
            border-color: var(--accent);
        }

        .btn-whatsapp {
            background: rgba(37, 211, 102, 0.1);
            color: var(--btn-whatsapp);
            border-color: rgba(37, 211, 102, 0.3);
        }

        .btn-whatsapp:hover {
            background: rgba(37, 211, 102, 0.15);
            border-color: var(--btn-whatsapp);
            color: var(--btn-whatsapp-hover);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: var(--card);
            border: 1px dashed var(--border);
            border-radius: 16px;
            color: var(--muted);
            display: none;
        }

        .empty-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        /* Toast styles */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #fff;
            color: #000;
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 14px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 1000;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
        .toast.toast-error { background: #e74c3c; color: white; }
        .toast.toast-success { background: #2ecc71; color: white; }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.show {
            display: flex;
        }

        .pw-box {
            background: var(--card);
            border: 1px solid rgba(201, 168, 76, 0.3);
            border-radius: 24px;
            width: 360px;
            max-width: calc(100vw - 40px);
            overflow: hidden;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .pw-header {
            padding: 28px 28px 20px;
            text-align: center;
            border-bottom: 1px solid var(--border);
        }

        .pw-header h2 {
            font-size: 18px;
            font-weight: 700;
            color: #ff4d6d;
            letter-spacing: 1px;
            margin-top: 10px;
        }

        .pw-body {
            padding: 28px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .pw-input {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            padding: 14px 18px;
            font-size: 16px;
            font-family: inherit;
            outline: none;
            width: 100%;
            text-align: center;
            letter-spacing: 4px;
            transition: border-color 0.2s;
        }

        .pw-input:focus {
            border-color: #ff4d6d;
        }

        .pw-error {
            color: #ff4d6d;
            font-size: 13px;
            text-align: center;
            display: none;
        }

        .btn-delete-confirm {
            background: #ff4d6d;
            color: #fff;
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s;
            font-family: inherit;
        }

        .btn-delete-confirm:hover {
            opacity: 0.88;
        }

        .btn-cancel {
            background: none;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px;
            font-size: 14px;
            color: var(--muted);
            cursor: pointer;
            transition: all 0.15s;
            font-family: inherit;
        }

        .btn-cancel:hover {
            border-color: var(--accent);
            color: var(--text);
        }

        .btn-delete {
            background: none;
            border: none;
            color: var(--muted);
            font-size: 16px;
            cursor: pointer;
            padding: 6px;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .btn-delete:hover {
            color: #ff4d6d;
            background: rgba(255, 77, 109, 0.1);
        }

        @media (max-width: 600px) {
            .card-top {
                flex-direction: column;
                gap: 8px;
            }
            .card-date {
                font-size: 12px;
            }
            .btn-back {
                top: 20px;
                left: 20px;
            }
            .header {
                padding-top: 70px;
            }
            .card-actions {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>
    <div class="header">
        <a href="index.html" class="btn-back">← Volver</a>
        <h1>HISTORIAL DE MECÁNICA</h1>
        <a href="formulario.html" class="btn-crear">
            <span>+</span> Crear nuevo formulario
        </a>
    </div>

    <div class="container">
        <div class="list-header">
            <span class="list-title">Inspecciones Guardadas</span>
            <span class="card-date" id="totalCount">0 registros</span>
        </div>

        <div id="loader" class="loader">
            Cargando inspecciones...
        </div>

        <div id="emptyState" class="empty-state">
            <div class="empty-icon">📂</div>
            <p>Aún no hay inspecciones guardadas.</p>
            <p style="font-size: 14px; margin-top: 8px;">Crea una nueva inspección para empezar.</p>
        </div>

        <div id="listContainer">
            <!-- Las tarjetas se insertarán aquí por JS -->
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <!-- MODAL BORRAR -->
    <div id="deleteModal" class="modal">
        <div class="pw-box">
            <div class="pw-header">
                <div style="font-size: 40px;">🗑️</div>
                <h2>BORRAR REGISTRO</h2>
                <p style="color: var(--muted); font-size: 13px; margin-top: 5px;">Ingresa la contraseña para confirmar</p>
            </div>
            <div class="pw-body">
                <input type="password" class="pw-input" id="deletePwInput" placeholder="••••••••" maxlength="20" onkeydown="if(event.key==='Enter') document.getElementById('btnDeleteConfirm').click()" />
                <div class="pw-error" id="deletePwError">❌ Contraseña incorrecta</div>
                <button class="btn-delete-confirm" id="btnDeleteConfirm">🗑️ Borrar Inspección</button>
                <button class="btn-cancel" onclick="closeDeleteModal()">Cancelar</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="mecanica.js?v=5"></script>
</body>

</html>
