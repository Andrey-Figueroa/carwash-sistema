<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pizarra CarWash — Control en Vivo</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07090d;--surface:#0d1219;--card:#111a25;--border:#1a2a3a;
  --accent:#00d4ff;--green:#00e676;--yellow:#ffc107;--red:#ff5252;
  --text:#dff0ff;--muted:#4a6a85;
}
body{background:var(--bg);font-family:"DM Sans",sans-serif;color:var(--text);min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden}

/* ── TOPBAR ── */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 28px;background:linear-gradient(90deg,#050d14,#081525);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.topbar-left{display:flex;align-items:center;gap:15px}
.logo-chip{background:rgba(0,212,255,0.08);border:1px solid rgba(0,212,255,0.25);border-radius:8px;padding:6px 14px;font-family:"Bebas Neue",sans-serif;font-size:18px;letter-spacing:2px;color:var(--accent)}
.page-title{font-family:"Bebas Neue",sans-serif;font-size:26px;letter-spacing:3px;background:linear-gradient(90deg,#fff 40%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.back-btn{background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:7px 14px;cursor:pointer;font-size:13px;font-family:inherit;transition:all .2s;text-decoration:none;display:flex;align-items:center;gap:6px}
.back-btn:hover{color:var(--text);border-color:var(--muted);background:rgba(255,255,255,0.05)}

/* ── STATS ── */
.stats-bar{display:flex;border-bottom:1px solid var(--border);background:var(--surface)}
.stat{flex:1;padding:14px 20px;border-right:1px solid var(--border);display:flex;align-items:center;gap:12px}
.stat-val{font-size:24px;font-weight:700;font-family:"DM Mono",monospace}
.stat-lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}

/* ── BOARD ── */
.board{display:grid;grid-template-columns:1fr 1fr 1fr;flex:1;min-height:calc(100vh - 130px)}
.zone{position:relative;border:1px solid var(--border);padding:22px;overflow:hidden}
.zone-title{font-family:"Bebas Neue",sans-serif;font-size:20px;letter-spacing:2px;color:var(--accent);margin-bottom:20px;display:block}
.cars-grid{display:flex;flex-wrap:wrap;gap:14px;align-content:flex-start}

/* ── CARDS ── */
.car-card{width:175px;background:rgba(0,0,0,0.45);border-radius:18px;border:1px solid rgba(255,255,255,0.06);padding:14px;transition:transform 0.2s,border-color 0.2s,box-shadow 0.2s;position:relative;overflow:hidden;cursor:pointer}
.car-card:hover{transform:translateY(-5px);border-color:var(--accent);box-shadow:0 8px 24px rgba(0,212,255,0.15)}
.car-plate{font-family:"DM Mono",monospace;font-size:13px;font-weight:bold;background:rgba(0,212,255,0.1);border:1px solid rgba(0,212,255,0.3);border-radius:6px;padding:4px;text-align:center;color:#fff}

/* ── MODAL COBRO ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);backdrop-filter:blur(8px);z-index:2000;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.show{display:flex}
.cobro-box {
  background: var(--surface); border: 1px solid var(--border); border-radius: 24px;
  width: 100%; max-width: 580px; max-height: 90vh; display: flex; flex-direction: column; overflow: hidden;
}
.cobro-header { padding: 22px 28px; border-bottom: 1px solid var(--border); flex-shrink: 0; display: flex; align-items: center; justify-content: space-between; }
.cobro-body { padding: 24px 28px; flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }
.cobro-footer { padding: 20px 28px; border-top: 1px solid var(--border); flex-shrink: 0; }

.metodos-btns{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.met-btn{display:flex;flex-direction:column;align-items:center;gap:6px;padding:12px 5px;border:2px solid var(--border);border-radius:14px;background:rgba(0,0,0,0.3);cursor:pointer;transition:all .2s;color:var(--muted);text-align:center}
.met-btn.active{border-color:var(--accent);background:rgba(0,212,255,0.1);color:var(--accent)}
.met-btn-name{font-size:10px;font-weight:700}

.montos-isla{display:none;flex-direction:column;gap:12px;background:rgba(0,212,255,0.04);border:1px solid rgba(0,212,255,0.2);border-radius:16px;padding:18px}
.montos-isla.show{display:flex}
.monto-field-row{display:flex;align-items:center;gap:14px}
.monto-input-wrap input{flex:1;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:10px;border-radius:8px;outline:none;font-family:"DM Mono"}

.resp-chip{padding:8px 16px;border:1px solid var(--border);border-radius:50px;font-size:13px;cursor:pointer;background:var(--bg);color:var(--muted);display:inline-block;margin:4px}
.resp-chip.selected{border-color:var(--accent);background:rgba(0,212,255,0.12);color:var(--accent)}

.btn-cobrar{width:100%;padding:16px;background:linear-gradient(135deg,#ffc107,#e6a800);color:#000;border:none;border-radius:14px;font-size:16px;font-weight:800;cursor:pointer}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <a class="back-btn" href="index.html">← Menú</a>
    <div class="logo-chip">CW</div>
    <div class="page-title">GESTIÓN DE LAVADO</div>
  </div>
  <div id="lastUpdate" style="font-size:12px; color:var(--muted)">Sincronizando...</div>
</div>

<div class="stats-bar">
  <div class="stat"><div><div class="stat-val" id="cnt-proceso">0</div><div class="stat-lbl">En Lavado</div></div></div>
  <div class="stat"><div><div class="stat-val" id="cnt-terminado" style="color:var(--green)">0</div><div class="stat-lbl">Listos</div></div></div>
  <div class="stat"><div><div class="stat-val" id="cnt-retirado" style="color:var(--red)">0</div><div class="stat-lbl">Entregados</div></div></div>
</div>

<div class="board">
  <div class="zone"><span class="zone-title">🚿 EN PROCESO</span><div class="cars-grid" id="grid-proceso"></div></div>
  <div class="zone"><span class="zone-title" style="color:var(--green)">🅿️ LISTOS</span><div class="cars-grid" id="grid-terminado"></div></div>
  <div class="zone"><span class="zone-title" style="color:var(--muted)">🚗 ENTREGADOS</span><div class="cars-grid" id="grid-retirado"></div></div>
</div>

<div class="modal-overlay" id="cobroModal">
  <div class="cobro-box">
    <div class="cobro-header">
      <div class="page-title" style="font-size:20px">💰 Finalizar Cobro</div>
      <button onclick="closeCobroModal()" style="background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer">✕</button>
    </div>

    <div class="cobro-body">
      <div style="display:flex; justify-content:space-between; align-items:center; background:rgba(0,0,0,0.2); padding:15px; border-radius:12px">
        <span id="cPlate" style="font-family:'DM Mono'; font-weight:bold; color:var(--accent)">---</span>
        <span id="cMonto" style="font-family:'DM Mono'; font-weight:800; color:var(--green)">₡0</span>
      </div>

      <div class="metodos-btns">
        <div class="met-btn" id="btnEfectivo" onclick="toggleBloque('Efectivo')"><span>💵</span><span class="met-btn-name">EFECTIVO</span></div>
        <div class="met-btn" id="btnSinpe" onclick="toggleBloque('Sinpe')"><span>📱</span><span class="met-btn-name">SINPE</span></div>
        <div class="met-btn" id="btnTarjeta" onclick="toggleBloque('Tarjeta')"><span>💳</span><span class="met-btn-name">TARJETA</span></div>
        <div class="met-btn" id="btnRegalo" onclick="toggleBloque('Regalo')"><span>🎁</span><span class="met-btn-name">REGALO</span></div>
        <div class="met-btn" id="btnCxC" onclick="toggleBloque('CxC')"><span>📋</span><span class="met-btn-name">DEUDA (CxC)</span></div>
      </div>

      <div class="montos-isla" id="montosIsla">
        <div id="rowEfectivo" style="display:none" class="monto-field-row"><span>💵</span><div class="monto-input-wrap"><input type="number" id="mEfectivo" placeholder="Monto Efectivo" oninput="calcTotal()"></div></div>
        <div id="rowSinpe" style="display:none" class="monto-field-row"><span>📱</span><div class="monto-input-wrap"><input type="number" id="mSinpe" placeholder="Monto SINPE" oninput="calcTotal()"></div></div>
        <div id="rowTarjeta" style="display:none" class="monto-field-row"><span>💳</span><div class="monto-input-wrap"><input type="number" id="mTarjeta" placeholder="Monto Tarjeta" oninput="calcTotal()"></div></div>
        <div id="rowRegalo" style="display:none" class="monto-field-row"><span>🎁</span><div class="monto-input-wrap"><input type="number" id="mRegalo" placeholder="Monto Regalo" oninput="calcTotal()"></div></div>
        <div id="rowCxC" style="display:none; color:var(--yellow); font-size:12px; text-align:center">⚠️ Registrando como cuenta por cobrar (Deuda total)</div>
      </div>

      <div>
        <div style="font-size:10px;color:var(--muted);margin-bottom:8px">RESPONSABLE</div>
        <div id="respChips">
          <div class="resp-chip" onclick="selectResp(this,'Eder')">Eder</div>
          <div class="resp-chip" onclick="selectResp(this,'Massiel')">Massiel</div>
          <div class="resp-chip" onclick="selectResp(this,'Andrey')">Andrey</div>
          <div class="resp-chip" onclick="selectResp(this,'Angie')">Angie</div>
        </div>
      </div>
    </div>

    <div class="cobro-footer">
      <button class="btn-cobrar" id="btnConfirmar" onclick="enviarCobro()">CONFIRMAR COBRO</button>
    </div>
  </div>
</div>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRZKI99U4UgQBDH7Can0vVO9TO0hhi6TkTYx4jNdTDxYDsM1dQrEG5UaIoftDmOdzkXAr8LOscVFxv-/pub?gid=0&single=true&output=csv";
const WEBHOOK = "https://neuraloom.app.n8n.cloud/webhook-test/finalizar-cobro";

let carsCache = [];
let selectedCar = null;
let metodos = new Set();
let responsable = "";

async function loadData() {
  const res = await fetch(CSV_URL);
  const text = await res.text();
  const rows = text.split('\n').slice(1);
  carsCache = rows.map(r => {
    const c = r.split(',');
    return { orden: c[0], placa: c[2], cliente: c[3], servicio: c[7], estado: (c[8]||"").toLowerCase(), monto: (c[12]||"0").replace(/\D/g,"") };
  }).filter(c => c.placa);
  render();
}

function render() {
  const grids = { proceso: document.getElementById('grid-proceso'), terminado: document.getElementById('grid-terminado'), retirado: document.getElementById('grid-retirado') };
  Object.values(grids).forEach(g => g.innerHTML = "");
  
  carsCache.forEach(car => {
    let zone = "proceso";
    if(car.estado.includes("listo")) zone = "terminado";
    if(car.estado.includes("retirado")) zone = "retirado";
    
    grids[zone].innerHTML += `
      <div class="car-card" onclick="openCobro('${car.placa}')">
        <div class="car-plate">${car.placa}</div>
        <div style="font-size:11px; margin-top:5px">${car.cliente}</div>
      </div>`;
  });
}

function openCobro(placa) {
  selectedCar = carsCache.find(c => c.placa === placa);
  document.getElementById('cPlate').textContent = selectedCar.placa;
  document.getElementById('cMonto').textContent = "₡" + parseInt(selectedCar.monto).toLocaleString();
  document.getElementById('cobroModal').classList.add('show');
}

function toggleBloque(m) {
  const btn = document.getElementById('btn'+m);
  const row = document.getElementById('row'+m);
  if(metodos.has(m)) {
    metodos.delete(m);
    btn.classList.remove('active');
    if(row) row.style.display = "none";
  } else {
    metodos.add(m);
    btn.classList.add('active');
    if(row) row.style.display = "flex";
  }
  document.getElementById('montosIsla').classList.toggle('show', metodos.size > 0);
}

function selectResp(el, name) {
  document.querySelectorAll('.resp-chip').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  responsable = name;
}

function closeCobroModal() {
  document.getElementById('cobroModal').classList.remove('show');
  metodos.clear();
  responsable = "";
  document.querySelectorAll('.met-btn, .resp-chip').forEach(b => b.classList.remove('active','selected'));
}

async function enviarCobro() {
  if(!responsable) return alert("Selecciona responsable");
  const btn = document.getElementById('btnConfirmar');
  btn.disabled = true; btn.textContent = "Procesando...";

  const payload = {
    orden: selectedCar.orden,
    placa: selectedCar.placa,
    cliente: selectedCar.cliente,
    totalServicio: selectedCar.monto,
    responsable: responsable,
    pagos: {
      efectivo: document.getElementById('mEfectivo').value || 0,
      sinpe: document.getElementById('mSinpe').value || 0,
      tarjeta: document.getElementById('mTarjeta').value || 0,
      regalo: document.getElementById('mRegalo').value || 0,
      cxc: metodos.has('CxC') ? selectedCar.monto : 0
    }
  };

  await fetch(WEBHOOK, { method: 'POST', body: JSON.stringify(payload) });
  alert("Cobro exitoso");
  closeCobroModal();
  loadData();
  btn.disabled = false; btn.textContent = "CONFIRMAR COBRO";
}

loadData();
</script>
</body>
</html>
