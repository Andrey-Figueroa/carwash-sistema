<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CarWash — Registrar Gastos</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #0a0e14;
            --card: #111720;
            --card-hover: #161f2c;
            --border: #1e2d3d;
            --accent: #00c6ff;
            --text: #e8f1ff;
            --muted: #5a7a99;
        }

        html, body {
            background: var(--bg);
            font-family: 'DM Sans', sans-serif;
            color: var(--text);
            min-height: 100vh;
        }

        .container {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            padding: 16px;
            max-width: 560px;
            margin: 0 auto;
        }

        /* HEADER */
        .header-area {
            display: flex;
            align-items: center;
            padding-bottom: 20px;
            position: relative;
        }
        .btn-back {
            text-decoration: none;
            color: var(--text);
            font-size: 13px;
            font-weight: 600;
            background: rgba(0,198,255,0.1);
            padding: 8px 15px;
            border-radius: 8px;
            border: 1px solid var(--accent);
            z-index: 10;
            transition: background 0.2s;
        }
        .btn-back:hover { background: rgba(0,198,255,0.2); }
        h2 {
            font-family: 'Bebas Neue', sans-serif;
            color: var(--accent);
            margin: 0;
            font-size: 24px;
            letter-spacing: 2px;
            position: absolute;
            width: 100%;
            text-align: center;
            left: 0;
            pointer-events: none;
        }

        /* FORM CARD */
        .form-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 28px 24px;
            display: flex;
            flex-direction: column;
            gap: 22px;
        }

        .form-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 22px;
            letter-spacing: 1.5px;
            color: var(--text);
            padding-bottom: 4px;
            border-bottom: 1px solid var(--border);
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .form-label .req {
            color: var(--accent);
            font-size: 16px;
            line-height: 1;
        }

        .form-input,
        .form-textarea {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            padding: 12px 14px;
            font-size: 15px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            width: 100%;
        }
        .form-input:focus,
        .form-textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(0,198,255,0.1);
        }
        .form-input::placeholder,
        .form-textarea::placeholder { color: var(--muted); }
        .form-input[type="number"]::-webkit-outer-spin-button,
        .form-input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }

        /* INPUT CON SÍMBOLO */
        .input-wrap {
            position: relative;
        }
        .input-wrap .symbol {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
            font-size: 15px;
            pointer-events: none;
        }
        .input-wrap .form-input {
            padding-right: 36px;
        }

        /* CHIPS DE RESPONSABLE */
        .chips-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .chip-label {
            cursor: pointer;
        }
        .chip-label input[type="radio"] {
            display: none;
        }
        .chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border-radius: 50px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--muted);
            font-size: 14px;
            font-weight: 500;
            transition: all 0.18s ease;
            user-select: none;
        }
        .chip:hover {
            border-color: var(--accent);
            color: var(--text);
        }
        .chip-label input[type="radio"]:checked + .chip {
            background: rgba(0,198,255,0.15);
            border-color: var(--accent);
            color: var(--accent);
            font-weight: 600;
        }

        /* TEXTAREA */
        .form-textarea {
            resize: vertical;
            min-height: 110px;
        }

        /* SUBMIT BTN */
        .btn-submit {
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 12px;
            padding: 15px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            transition: background 0.2s, transform 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            margin-top: 4px;
        }
        .btn-submit:hover { background: #00aadd; }
        .btn-submit:active { transform: scale(0.98); }
        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* SUCCESS STATE */
        .success-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 50px 20px;
            gap: 14px;
            flex-grow: 1;
        }
        .success-screen .check-icon { font-size: 64px; }
        .success-screen h3 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 28px;
            letter-spacing: 2px;
            color: var(--text);
        }
        .success-screen p { color: var(--muted); font-size: 14px; line-height: 1.6; }
        .success-screen .btn-nuevo {
            margin-top: 10px;
            background: rgba(0,198,255,0.1);
            border: 1px solid var(--accent);
            color: var(--accent);
            border-radius: 12px;
            padding: 12px 28px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: background 0.2s;
        }
        .success-screen .btn-nuevo:hover { background: rgba(0,198,255,0.2); }

        /* ERROR BANNER */
        .error-banner {
            display: none;
            background: rgba(255,80,80,0.1);
            border: 1px solid rgba(255,80,80,0.3);
            border-radius: 10px;
            color: #ff7b7b;
            padding: 12px 16px;
            font-size: 13px;
            text-align: center;
        }

        /* SPINNER */
        .spinner {
            display: inline-block;
            width: 18px; height: 18px;
            border: 2px solid rgba(0,0,0,0.3);
            border-top-color: #000;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <!-- HEADER -->
        <div class="header-area">
            <a href="index.html" class="btn-back">← VOLVER</a>
            <h2>REGISTRAR GASTOS</h2>
        </div>

        <!-- FORMULARIO -->
        <div class="form-card" id="formCard">
            <div class="form-title">💸 Nuevo Gasto</div>

            <!-- MONTO -->
            <div class="form-group">
                <label class="form-label">Monto del gasto <span class="req">*</span></label>
                <div class="input-wrap">
                    <input
                        class="form-input"
                        type="number"
                        id="monto"
                        placeholder="0"
                        min="0"
                        step="any"
                    />
                    <span class="symbol">₡</span>
                </div>
            </div>

            <!-- RESPONSABLE -->
            <div class="form-group">
                <label class="form-label">Responsable <span class="req">*</span></label>
                <div class="chips-grid" id="chipsGrid">
                    <label class="chip-label">
                        <input type="radio" name="responsable" value="Eder">
                        <span class="chip">Eder</span>
                    </label>
                    <label class="chip-label">
                        <input type="radio" name="responsable" value="Juan">
                        <span class="chip">Juan</span>
                    </label>
                    <label class="chip-label">
                        <input type="radio" name="responsable" value="Jesus">
                        <span class="chip">Jesus</span>
                    </label>
                    <label class="chip-label">
                        <input type="radio" name="responsable" value="Massiel">
                        <span class="chip">Massiel</span>
                    </label>
                    <label class="chip-label">
                        <input type="radio" name="responsable" value="Ricardo">
                        <span class="chip">Ricardo</span>
                    </label>
                    <label class="chip-label">
                        <input type="radio" name="responsable" value="Cecilio">
                        <span class="chip">Cecilio</span>
                    </label>
                    <label class="chip-label">
                        <input type="radio" name="responsable" value="Otro">
                        <span class="chip">Otro</span>
                    </label>
                </div>
            </div>

            <!-- DESCRIPCIÓN -->
            <div class="form-group">
                <label class="form-label">Descripción del gasto <span class="req">*</span></label>
                <textarea
                    class="form-textarea"
                    id="descripcion"
                    placeholder="¿En qué se gastó? Ej: Compra de jabón, pago de servicios..."
                ></textarea>
            </div>

            <!-- ERROR -->
            <div class="error-banner" id="errorBanner">
                ⚠️ <span id="errorMsg">Por favor completa todos los campos.</span>
            </div>

            <!-- SUBMIT -->
            <button class="btn-submit" id="btnSubmit" onclick="enviarGasto()">
                Registrar gastos →
            </button>
        </div>

        <!-- SUCCESS -->
        <div class="success-screen" id="successScreen">
            <div class="check-icon">✅</div>
            <h3>¡Gasto Registrado!</h3>
            <p>El gasto fue guardado correctamente<br>en Google Sheets.</p>
            <button class="btn-nuevo" onclick="resetForm()">+ Registrar otro gasto</button>
            <a href="index.html" class="btn-back" style="margin-top:8px">← Volver al menú</a>
        </div>
    </div>

    <script>
        // Webhook oficial de n8n cloud
        const N8N_WEBHOOK_URL = "https://neuraloom.app.n8n.cloud/webhook/registrar-gasto";

        async function enviarGasto() {
            const monto = document.getElementById("monto").value.trim();
            const responsableEl = document.querySelector('input[name="responsable"]:checked');
            const descripcion = document.getElementById("descripcion").value.trim();
            const errorBanner = document.getElementById("errorBanner");
            const errorMsg = document.getElementById("errorMsg");

            // Validación
            if (!monto || !responsableEl || !descripcion) {
                errorMsg.textContent = "Por favor completa todos los campos requeridos.";
                errorBanner.style.display = "block";
                return;
            }
            if (parseFloat(monto) <= 0) {
                errorMsg.textContent = "El monto debe ser mayor a 0.";
                errorBanner.style.display = "block";
                return;
            }

            errorBanner.style.display = "none";

            const btn = document.getElementById("btnSubmit");
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Enviando...';

            const payload = {
                monto: parseFloat(monto),
                responsable: responsableEl.value,
                descripcion: descripcion,
                fecha: new Date().toLocaleString("es-CR", {
                    timeZone: "America/Costa_Rica",
                    day: "2-digit", month: "2-digit", year: "numeric",
                    hour: "2-digit", minute: "2-digit"
                })
            };

            try {
                const response = await fetch(N8N_WEBHOOK_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) throw new Error("Error del servidor: " + response.status);

                // Mostrar éxito
                document.getElementById("formCard").style.display = "none";
                document.getElementById("successScreen").style.display = "flex";

            } catch (err) {
                errorMsg.textContent = "Error al enviar. Verifica la conexión e intenta de nuevo.";
                errorBanner.style.display = "block";
                btn.disabled = false;
                btn.innerHTML = "Registrar gastos →";
            }
        }

        function resetForm() {
            document.getElementById("monto").value = "";
            document.querySelectorAll('input[name="responsable"]').forEach(r => r.checked = false);
            document.getElementById("descripcion").value = "";
            document.getElementById("errorBanner").style.display = "none";
            document.getElementById("btnSubmit").disabled = false;
            document.getElementById("btnSubmit").innerHTML = "Registrar gastos →";
            document.getElementById("formCard").style.display = "flex";
            document.getElementById("successScreen").style.display = "none";
        }
    </script>
</body>
</html>
