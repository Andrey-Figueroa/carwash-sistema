<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Administración — Sus Amigos Detailer's Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root { --bg: #0a0c0f; --card: #111418; --card-hover: #181d24; --border: #1e2730; --accent: #c9a84c; --accent2: #f0c96a; --text: #f0e8d5; --muted: #7a6a4a; }
        body { background: var(--bg); font-family: "DM Sans", sans-serif; color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 0 0 80px; overflow-x: hidden; }

        .header { width: 100%; position: relative; height: 280px; overflow: hidden; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 32px; }
        .header-bg { position: absolute; inset: 0; background: linear-gradient(180deg, transparent 20%, var(--bg) 100%), radial-gradient(ellipse at 50% 0%, rgba(201,168,76,0.18) 0%, transparent 70%); }
        .gold-line { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 60%; height: 1px; background: linear-gradient(to right, transparent, var(--accent), transparent); }

        .header-content { position: relative; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .logo-img { width: 110px; height: 110px; object-fit: contain; border-radius: 14px; border: 1px solid rgba(201,168,76,0.3); background: #000; padding: 6px; box-shadow: 0 0 40px rgba(201,168,76,0.2); }
        .badge { display: inline-flex; align-items: center; gap: 6px; background: rgba(201,168,76,0.1); border: 1px solid rgba(201,168,76,0.3); border-radius: 50px; padding: 4px 14px; font-size: 11px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); }
        h1 { font-family: "Bebas Neue", sans-serif; font-size: clamp(32px, 7vw, 52px); letter-spacing: 5px; line-height: 1; background: linear-gradient(135deg, #f0e8d5 20%, var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

        .grid { display: grid; grid-template-columns: 1fr; gap: 16px; width: 100%; max-width: 480px; padding: 32px 20px 0; }

        .admin-card { display: flex; align-items: center; gap: 20px; background: var(--card); border: 1px solid rgba(201,168,76,0.2); border-radius: 20px; padding: 28px 24px; text-decoration: none; color: var(--text); transition: all 0.25s ease; cursor: pointer; position: relative; overflow: hidden; }
        .admin-card::before { content: ""; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(201,168,76,0.04), transparent); opacity: 0; transition: opacity 0.25s; }
        .admin-card:hover { transform: translateY(-4px); border-color: var(--accent); background: var(--card-hover); box-shadow: 0 8px 32px rgba(201,168,76,0.12); }
        .admin-card:hover::before { opacity: 1; }

        .icon-wrap { width: 58px; height: 58px; border-radius: 14px; background: rgba(201,168,76,0.1); border: 1px solid rgba(201,168,76,0.2); display: flex; align-items: center; justify-content: center; font-size: 28px; flex-shrink: 0; transition: all 0.25s; }
        .admin-card:hover .icon-wrap { background: rgba(201,168,76,0.18); transform: scale(1.05); }

        .card-info { flex: 1; }
        .card-title { font-size: 17px; font-weight: 700; letter-spacing: 0.3px; color: var(--text); }
        .card-sub { font-size: 13px; color: var(--muted); margin-top: 4px; }

        .arrow { color: var(--muted); font-size: 20px; transition: all 0.25s; }
        .admin-card:hover .arrow { color: var(--accent); transform: translateX(4px); }

        .back-btn { margin-top: 40px; display: inline-flex; align-items: center; gap: 10px; color: var(--muted); font-size: 14px; text-decoration: none; transition: color 0.2s; cursor: pointer; background: none; border: none; font-family: inherit; }
        .back-btn:hover { color: var(--accent); }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .admin-card:nth-child(1) { animation: slideUp 0.4s ease 0.1s both; }
        .admin-card:nth-child(2) { animation: slideUp 0.4s ease 0.2s both; }
        .admin-card:nth-child(3) { animation: slideUp 0.4s ease 0.3s both; }
    </style>
</head>
